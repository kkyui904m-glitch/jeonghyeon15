<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jeonghyeon_15</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; color: #000; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #FFFFFF 100%);
            min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        header {
            width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background-color: rgba(255, 255, 255, 0.9); border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        .site-title { font-size: 1.5rem; font-weight: bold; }
        .btn {
            background-color: #87CEEB; border: none; padding: 8px 16px; border-radius: 5px;
            cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        .btn:hover { background-color: #70b5d3; }
        .container { width: 100%; max-width: 800px; }
        .admin-panel {
            background-color: #ffffff; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; display: none;
        }
        .admin-panel.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card {
            background-color: #ffffff; border-radius: 10px; padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; word-break: break-all;
        }
        .card img { max-width: 100%; max-height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        .card a { color: #1e90ff; text-decoration: underline; font-weight: bold; margin-top: 10px; }
        .delete-btn { background-color: #ff6b6b; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-top: 10px; align-self: flex-end; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background-color: #ffffff; padding: 30px; border-radius: 10px; width: 300px; }
    </style>
</head>
<body>

    <header>
        <div class="site-title">jeonghyeon_15</div>
        <button id="authBtn" class="btn" onclick="openLoginModal()">관리자 로그인</button>
    </header>

    <div class="container">
        <div id="adminPanel" class="admin-panel">
            <h3>콘텐츠 추가 (관리자 전용)</h3>
            <br>
            <div class="form-group">
                <label for="imgFile">사진 선택 (최대 3.00MB):</label>
                <input type="file" id="imgFile" accept="image/*">
            </div>
            <div class="form-group">
                <label for="linkUrl">연결할 링크 URL:</label>
                <input type="text" id="linkUrl" placeholder="https://example.com">
            </div>
            <div class="form-group">
                <label for="titleText">제목/설명:</label>
                <input type="text" id="titleText" placeholder="사진 또는 링크 설명">
            </div>
            <button class="btn" id="addBtn" onclick="addContent()">추가하기</button>
        </div>

        <div id="contentGrid" class="content-grid"></div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">관리자 로그인</h3>
            <div class="form-group">
                <label for="adminId">아이디</label>
                <input type="text" id="adminId">
            </div>
            <div class="form-group">
                <label for="adminPw">비밀번호</label>
                <input type="password" id="adminPw">
            </div>
            <button class="btn" style="width: 100%;" onclick="login()">로그인</button>
            <button class="btn" style="width: 100%; margin-top: 5px; background-color: #ccc;" onclick="closeLoginModal()">취소</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVrxmd43JpHQLGUv8Q_ElJ9U8MXyzWjPQ",
            authDomain: "jeonghyeon15-afdfe.firebaseapp.com",
            databaseURL: "https://jeonghyeon15-afdfe-default-rtdb.firebaseio.com",
            projectId: "jeonghyeon15-afdfe",
            storageBucket: "jeonghyeon15-afdfe.firebasestorage.app",
            messagingSenderId: "71726702953",
            appId: "1:71726702953:web:4ea7949df510fc3f45ddf8"
        };

        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        // ImgBB 무료 API Key
        const IMGBB_API_KEY = "6d25783705b22b627f12e2c88f331908";

        const ADMIN_ID = "jeonghyeon";
        const ADMIN_PW = "0015";
        let isAdmin = false;

        window.onload = function() {
            rtdb.ref('items').on('value', (snapshot) => {
                renderContent(snapshot.val());
            });
        };

        function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }

        function login() {
            const idInput = document.getElementById('adminId').value;
            const pwInput = document.getElementById('adminPw').value;

            if (idInput === ADMIN_ID && pwInput === ADMIN_PW) {
                isAdmin = true;
                alert('관리자로 로그인되었습니다.');
                document.getElementById('adminPanel').classList.add('active');
                
                const authBtn = document.getElementById('authBtn');
                authBtn.innerText = '로그아웃';
                authBtn.onclick = logout;
                
                closeLoginModal();
                rtdb.ref('items').once('value', (snapshot) => renderContent(snapshot.val()));
            } else {
                alert('아이디 또는 비밀번호가 올바르지 않습니다.');
            }
        }

        function logout() {
            isAdmin = false;
            alert('로그아웃되었습니다.');
            document.getElementById('adminPanel').classList.remove('active');
            
            const authBtn = document.getElementById('authBtn');
            authBtn.innerText = '관리자 로그인';
            authBtn.onclick = openLoginModal;
            
            rtdb.ref('items').once('value', (snapshot) => renderContent(snapshot.val()));
        }

        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append("image", file);

            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });

            const result = await response.json();
            if (result.success) {
                return result.data.url;
            } else {
                throw new Error("이미지 서버 업로드 실패");
            }
        }

        async function addContent() {
            const fileInput = document.getElementById('imgFile');
            const linkUrl = document.getElementById('linkUrl').value.trim();
            const titleText = document.getElementById('titleText').value.trim();
            const file = fileInput.files[0];

            if (!file && !linkUrl) {
                alert('사진을 선택하거나 링크 URL을 입력해 주세요.');
                return;
            }

            const addBtn = document.getElementById('addBtn');
            addBtn.innerText = "사진 업로드 중...";
            addBtn.disabled = true;

            let imageUrl = "";

            try {
                if (file) {
                    // 정확히 3.00MB (3 * 1024 * 1024 bytes) 제한 검사
                    const MAX_SIZE = 3 * 1024 * 1024;
                    if (file.size > MAX_SIZE) {
                        alert('이미지 용량이 너무 큽니다. 3.00MB 이하의 사진만 올려주세요.');
                        addBtn.innerText = "추가하기";
                        addBtn.disabled = false;
                        return;
                    }
                    imageUrl = await uploadToImgBB(file);
                }

                const newItemRef = rtdb.ref('items').push();
                await newItemRef.set({
                    id: newItemRef.key,
                    imgUrl: imageUrl,
                    linkUrl: linkUrl,
                    title: titleText || '제목 없음',
                    createdAt: Date.now()
                });

                document.getElementById('imgFile').value = '';
                document.getElementById('linkUrl').value = '';
                document.getElementById('titleText').value = '';

                alert('정상적으로 등록되었습니다!');
            } catch (error) {
                alert('업로드 오류: ' + error.message);
            } finally {
                addBtn.innerText = "추가하기";
                addBtn.disabled = false;
            }
        }

        async function deleteItem(id) {
            if (confirm('삭제하시겠습니까?')) {
                await rtdb.ref('items/' + id).remove();
            }
        }

        function renderContent(data) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';

            if (!data) return;

            const items = Object.values(data).sort((a, b) => b.createdAt - a.createdAt);

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';

                let html = '';
                if (item.imgUrl) {
                    html += `<img src="${item.imgUrl}" alt="사진">`;
                }
                html += `<p style="font-weight: bold; margin-bottom: 5px;">${item.title}</p>`;
                if (item.linkUrl) {
                    html += `<a href="${item.linkUrl}" target="_blank" rel="noopener noreferrer">링크 바로가기</a>`;
                }
                if (isAdmin) {
                    html += `<button class="delete-btn" onclick="deleteItem('${item.id}')">삭제</button>`;
                }

                card.innerHTML = html;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
